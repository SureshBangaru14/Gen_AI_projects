services:
  - type: web
    name: resume-ats-api
    env: python
    rootDir: projects/resume_ats

    buildCommand: |
      apt-get update
      apt-get install -y tesseract-ocr poppler-utils
      pip install -r requirements.txt

    startCommand: |
      uvicorn app.main:app --host 0.0.0.0 --port 8000
